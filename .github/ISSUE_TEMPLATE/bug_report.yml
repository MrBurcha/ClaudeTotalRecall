name: Bug report
description: Report something that isn't working
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, and what went wrong?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: false
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App / CLI version
      placeholder: e.g. 0.3.0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any error output. Do NOT paste credentials or tokens.
      render: shell
    validations:
      required: false
