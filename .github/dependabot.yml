# Dependabot is report-only: it still resolves the dependency graph and powers
# security ALERTS (enabled in the repo's security settings), but it never opens
# version-update PRs — `open-pull-requests-limit: 0` disables them. Actionable
# updates (majors, minors/patches, security) are surfaced instead as a single
# weekly issue by .github/workflows/deps-report.yml (npm outdated + npm audit).
# Rationale: the automatic per-dependency PRs were noise; a rolling digest is
# reviewed on our own cadence. Dependabot security UPDATES (auto-PRs for CVEs)
# are turned OFF in repo settings so nothing here opens a PR.
version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 0

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
