name: release

on:
  push:
    tags:
      - 'v*.*.*'

# Needed so electron-builder can create/edit the tag's Release.
permissions:
  contents: write

jobs:
  # Pre-create the tag's draft Release ONCE, up front. Otherwise the parallel
  # macos/linux `electron-builder --publish always` jobs each see "release doesn't
  # exist" and both create one — a race that leaves two drafts for the same tag and
  # drops one platform's assets (v0.7.0 lost its macOS .dmg this way). With the draft
  # already present, both build jobs just upload into it. Idempotent (safe on re-run).
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure a draft Release exists for the tag
        run: |
          gh release view "$TAG" -R "$REPO" >/dev/null 2>&1 \
            || gh release create "$TAG" -R "$REPO" --draft --title "${TAG#v}" \
                 --notes "Release notes are being assembled…"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}

  macos:
    needs: create-release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Cache Electron + electron-builder binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-
      - run: npm ci
      - run: npm run build:app
      - name: Build dmg (unsigned, not published yet)
        run: npx electron-builder --mac --config electron-builder.yml --publish never
        env:
          # Personal use: no signing or notarization.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      # Real Finder-invisible flag (SetFile -a V) on everything in the dmg's
      # root except the .app + Applications alias, so dmg-builder's internal
      # background-image resource doesn't show as a stray icon when a user
      # has "Show Hidden Files" toggled on (#67). Must run before upload —
      # hence --publish never above instead of an electron-builder
      # afterAllArtifactBuild hook (documented as racy with --publish always:
      # electron-builder#3908 / #7145).
      - name: Hide DMG background resource from Finder (SetFile -a V)
        run: bash scripts/harden-dmg.sh release/*.dmg
      - name: Upload dmg to the tag's draft Release
        run: gh release upload "$TAG" release/*.dmg --clobber -R "$REPO"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}

  linux:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Cache Electron + electron-builder binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-
      - run: npm ci
      - run: npm run build:app
      # fpm builds the pacman target with bsdtar (.MTREE); ubuntu doesn't ship it by default.
      - name: Install bsdtar (required by fpm for the pacman target)
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools
      - name: Build & publish AppImage + deb + pacman
        run: npx electron-builder --linux --config electron-builder.yml --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Both jobs upload their binaries to the Release as a draft; this final job
  # assembles the notes from the CHANGELOG and publishes it once, with all the
  # assets (mac + linux) present.
  publish:
    needs: [macos, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # macOS uploads its dmg by hand (gh release upload, which supports an inline
      # #label), but Linux publishes AppImage/deb/pacman via electron-builder's own
      # GitHub publisher, which doesn't set labels at all. Patching the label here,
      # after both jobs finished uploading, covers all 4 binaries uniformly without
      # re-uploading anything (the Assets list shows this text instead of the raw
      # filename; the actual download name is unaffected).
      #
      # `gh api repos/.../releases/tags/$TAG` 404s here — that REST endpoint doesn't
      # resolve draft releases, and this step runs while the tag's Release is still a
      # draft (the "publish the Release" steps below are what un-drafts it). `gh
      # release view` IS draft-aware, and its `assets[].apiUrl` is already the exact
      # REST endpoint each PATCH needs — `assets[].id` is a GraphQL node id, not the
      # numeric id that endpoint expects, so apiUrl sidesteps that mismatch too
      # (learned from v0.9.4's release run, which failed here on the first try).
      - name: Label release assets by platform
        run: |
          set -euo pipefail
          declare -A LABELS=(
            [".dmg"]="macOS (Apple Silicon) — .dmg installer"
            [".AppImage"]="Linux — AppImage (portable, any distro)"
            [".deb"]="Linux — Debian/Ubuntu (.deb, amd64)"
            [".pacman"]="Linux — Arch/Manjaro (.pacman)"
          )
          gh release view "$TAG" -R "$REPO" --json assets --jq '.assets[] | "\(.apiUrl)\t\(.name)"' |
          while IFS=$'\t' read -r api_url name; do
            for ext in "${!LABELS[@]}"; do
              if [[ "$name" == *"$ext" ]]; then
                gh api --method PATCH "$api_url" -f "label=${LABELS[$ext]}"
                break
              fi
            done
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
      # Extract the "## [x.y.z]" section of the CHANGELOG as the Release body. If
      # the version isn't documented, let GitHub auto-generate the notes
      # (--generate-notes) so a Release is never published with an empty body.
      - name: Assemble release notes from the CHANGELOG
        id: notes
        run: |
          VERSION="${TAG#v}"
          awk -v ver="$VERSION" '
            $0 ~ ("^## \\[" ver "\\]") {flag=1; next}
            /^## \[/ {flag=0}
            flag {print}
          ' CHANGELOG.md | sed '/./,$!d' > release-notes.md
          if [ -s release-notes.md ]; then
            echo "generate=false" >> "$GITHUB_OUTPUT"
          else
            echo "generate=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          TAG: ${{ github.ref_name }}
      - name: Publish the Release with CHANGELOG notes
        if: steps.notes.outputs.generate == 'false'
        run: gh release edit "$TAG" --draft=false --latest --notes-file release-notes.md -R "$REPO"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
      - name: Publish the Release with auto-generated notes (fallback)
        if: steps.notes.outputs.generate == 'true'
        run: gh release edit "$TAG" --draft=false --latest --generate-notes -R "$REPO"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
