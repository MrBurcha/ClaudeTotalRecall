name: release

on:
  push:
    tags:
      - 'v*.*.*'

# Needed so electron-builder can create/edit the tag's Release.
permissions:
  contents: write

jobs:
  # Pre-create the tag's draft Release ONCE, up front. Otherwise the parallel
  # macos/linux `electron-builder --publish always` jobs each see "release doesn't
  # exist" and both create one — a race that leaves two drafts for the same tag and
  # drops one platform's assets (v0.7.0 lost its macOS .dmg this way). With the draft
  # already present, both build jobs just upload into it. Idempotent (safe on re-run).
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure a draft Release exists for the tag
        run: |
          gh release view "$TAG" -R "$REPO" >/dev/null 2>&1 \
            || gh release create "$TAG" -R "$REPO" --draft --title "${TAG#v}" \
                 --notes "Release notes are being assembled…"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}

  macos:
    needs: create-release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:app
      - name: Build & publish dmg (unsigned)
        run: npx electron-builder --mac --config electron-builder.yml --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Personal use: no signing or notarization.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

  linux:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:app
      # fpm builds the pacman target with bsdtar (.MTREE); ubuntu doesn't ship it by default.
      - name: Install bsdtar (required by fpm for the pacman target)
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools
      - name: Build & publish AppImage + deb + pacman
        run: npx electron-builder --linux --config electron-builder.yml --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Both jobs upload their binaries to the Release as a draft; this final job
  # assembles the notes from the CHANGELOG and publishes it once, with all the
  # assets (mac + linux) present.
  publish:
    needs: [macos, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Extract the "## [x.y.z]" section of the CHANGELOG as the Release body. If
      # the version isn't documented, let GitHub auto-generate the notes
      # (--generate-notes) so a Release is never published with an empty body.
      - name: Assemble release notes from the CHANGELOG
        id: notes
        run: |
          VERSION="${TAG#v}"
          awk -v ver="$VERSION" '
            $0 ~ ("^## \\[" ver "\\]") {flag=1; next}
            /^## \[/ {flag=0}
            flag {print}
          ' CHANGELOG.md | sed '/./,$!d' > release-notes.md
          if [ -s release-notes.md ]; then
            echo "generate=false" >> "$GITHUB_OUTPUT"
          else
            echo "generate=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          TAG: ${{ github.ref_name }}
      - name: Publish the Release with CHANGELOG notes
        if: steps.notes.outputs.generate == 'false'
        run: gh release edit "$TAG" --draft=false --latest --notes-file release-notes.md -R "$REPO"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
      - name: Publish the Release with auto-generated notes (fallback)
        if: steps.notes.outputs.generate == 'true'
        run: gh release edit "$TAG" --draft=false --latest --generate-notes -R "$REPO"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
