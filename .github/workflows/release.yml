name: release

on:
  push:
    tags:
      - 'v*.*.*'

# Needed so electron-builder can create/edit the tag's Release.
permissions:
  contents: write

jobs:
  # Pre-create the tag's draft Release ONCE, up front. Historically (when macos/linux
  # both used `electron-builder --publish always`), each job saw "release doesn't
  # exist" and both created one — a race that left two drafts for the same tag and
  # dropped one platform's assets (v0.7.0 lost its macOS .dmg this way). Both jobs now
  # upload by hand via `gh release upload`, which requires the Release to already
  # exist rather than racing to create it — this job is what guarantees that.
  # Idempotent (safe on re-run).
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure a draft Release exists for the tag
        run: |
          gh release view "$TAG" -R "$REPO" >/dev/null 2>&1 \
            || gh release create "$TAG" -R "$REPO" --draft --title "${TAG#v}" \
                 --notes "Release notes are being assembled…"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}

  macos:
    needs: create-release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      # Keyed on Electron/electron-builder's own resolved versions, not
      # hashFiles('package-lock.json') — `npm version` (run on every "release:
      # vX.Y.Z" commit) rewrites the lockfile's top-level version field, which
      # would invalidate that hash on every single release even when neither
      # dependency actually changed.
      - name: Resolve Electron/electron-builder versions for cache key
        id: versions
        run: |
          echo "electron=$(jq -r '.packages["node_modules/electron"].version' package-lock.json)" >> "$GITHUB_OUTPUT"
          echo "builder=$(jq -r '.packages["node_modules/electron-builder"].version' package-lock.json)" >> "$GITHUB_OUTPUT"
      - name: Cache Electron + electron-builder binaries
        uses: actions/cache@v6
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-${{ steps.versions.outputs.electron }}-${{ steps.versions.outputs.builder }}
          restore-keys: |
            ${{ runner.os }}-electron-
      - run: npm ci
      - run: npm run build:app
      - name: Build dmg (unsigned, not published yet)
        run: npx electron-builder --mac --config electron-builder.yml --publish never
        env:
          # Personal use: no signing or notarization.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      # Real Finder-invisible flag (SetFile -a V) on everything in the dmg's
      # root except the .app + Applications alias, so dmg-builder's internal
      # background-image resource doesn't show as a stray icon when a user
      # has "Show Hidden Files" toggled on (#67). Must run before upload —
      # hence --publish never above instead of an electron-builder
      # afterAllArtifactBuild hook (documented as racy with --publish always:
      # electron-builder#3908 / #7145).
      - name: Hide DMG background resource from Finder (SetFile -a V)
        run: bash scripts/harden-dmg.sh release/*.dmg
      - name: Upload dmg to the tag's draft Release
        run: |
          DMG=$(ls release/*.dmg)
          gh release upload "$TAG" "$DMG#macOS (Apple Silicon) — .dmg installer" --clobber -R "$REPO"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}

  linux:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      # See the equivalent step in the macos job above for why this keys on
      # Electron/electron-builder's resolved versions rather than
      # hashFiles('package-lock.json').
      - name: Resolve Electron/electron-builder versions for cache key
        id: versions
        run: |
          echo "electron=$(jq -r '.packages["node_modules/electron"].version' package-lock.json)" >> "$GITHUB_OUTPUT"
          echo "builder=$(jq -r '.packages["node_modules/electron-builder"].version' package-lock.json)" >> "$GITHUB_OUTPUT"
      - name: Cache Electron + electron-builder binaries
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ steps.versions.outputs.electron }}-${{ steps.versions.outputs.builder }}
          restore-keys: |
            ${{ runner.os }}-electron-
      - run: npm ci
      - run: npm run build:app
      # fpm builds the pacman target with bsdtar (.MTREE); ubuntu doesn't ship it by default.
      - name: Install bsdtar (required by fpm for the pacman target)
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools
      # --publish never (not "always"): electron-builder's own GitHub publisher can't
      # set an asset label, and it also emits latest-linux.yml (an electron-updater
      # manifest the app doesn't use — no autoUpdater/electron-updater anywhere in
      # src/). Uploading by hand below, same as the macos job, skips both.
      - name: Build AppImage + deb + pacman (not published yet)
        run: npx electron-builder --linux --config electron-builder.yml --publish never
      - name: Upload Linux binaries to the tag's draft Release
        run: |
          APPIMAGE=$(ls release/*.AppImage)
          DEB=$(ls release/*.deb)
          PACMAN=$(ls release/*.pacman)
          gh release upload "$TAG" \
            "$APPIMAGE#Linux — AppImage (portable, any distro)" \
            "$DEB#Linux — Debian/Ubuntu (.deb, amd64)" \
            "$PACMAN#Linux — Arch/Manjaro (.pacman)" \
            --clobber -R "$REPO"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}

  # Both jobs upload their binaries to the Release as a draft (labeled inline via
  # gh release upload's `file#label` syntax); this final job assembles the notes
  # from the CHANGELOG and publishes it once, with all the assets present.
  publish:
    needs: [macos, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Extract the "## [x.y.z]" section of the CHANGELOG as the Release body. If
      # the version isn't documented, let GitHub auto-generate the notes
      # (--generate-notes) so a Release is never published with an empty body.
      - name: Assemble release notes from the CHANGELOG
        id: notes
        run: |
          VERSION="${TAG#v}"
          awk -v ver="$VERSION" '
            $0 ~ ("^## \\[" ver "\\]") {flag=1; next}
            /^## \[/ {flag=0}
            flag {print}
          ' CHANGELOG.md | sed '/./,$!d' > release-notes.md
          if [ -s release-notes.md ]; then
            echo "generate=false" >> "$GITHUB_OUTPUT"
          else
            echo "generate=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          TAG: ${{ github.ref_name }}
      - name: Publish the Release with CHANGELOG notes
        if: steps.notes.outputs.generate == 'false'
        run: gh release edit "$TAG" --draft=false --latest --notes-file release-notes.md -R "$REPO"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
      - name: Publish the Release with auto-generated notes (fallback)
        if: steps.notes.outputs.generate == 'true'
        run: gh release edit "$TAG" --draft=false --latest --generate-notes -R "$REPO"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
