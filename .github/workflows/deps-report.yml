name: Weekly dependency report

# Report-only replacement for Dependabot version-update PRs (see .github/dependabot.yml).
# Runs npm outdated + npm audit and folds the result into a single rolling issue
# labelled `dependency-dashboard`, so dependency work is reviewed on our cadence
# instead of arriving as a stream of PRs. Trigger manually from the Actions tab
# (workflow_dispatch) to refresh it on demand.

on:
  schedule:
    - cron: '0 13 * * 1' # Mondays 13:00 UTC
  workflow_dispatch:

# Least privilege: read the repo, write the dashboard issue. Nothing else.
permissions:
  contents: read
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # Both commands exit non-zero when they find something — that's expected,
      # not a failure, so swallow the code and keep the JSON.
      - name: Collect outdated packages
        run: npm outdated --json > outdated.json || true
      - name: Collect audit report
        run: npm audit --json > audit.json || true

      - name: Build and upsert dashboard issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const LABEL = 'dependency-dashboard'
            const TITLE = '📦 Dependency dashboard'

            const readJson = (f) => {
              try { return JSON.parse(fs.readFileSync(f, 'utf8') || '{}') } catch { return {} }
            }
            const outdated = readJson('outdated.json')
            const audit = readJson('audit.json')

            const major = (v) => parseInt(String(v || '0').replace(/^[^\d]*/, '').split('.')[0], 10) || 0

            // --- outdated → majors vs minors/patches ---
            const majors = [], minors = []
            for (const [name, raw] of Object.entries(outdated)) {
              const info = Array.isArray(raw) ? raw[0] : raw
              if (!info || !info.latest) continue
              const row = `| \`${name}\` | ${info.current ?? '—'} | ${info.latest} |`
              if (major(info.latest) > major(info.current)) majors.push(row)
              else minors.push(row)
            }

            // --- audit → severity summary ---
            const meta = (audit.metadata && audit.metadata.vulnerabilities) || {}
            const vulnRows = Object.values(audit.vulnerabilities || {}).map((v) => {
              const fix = v.fixAvailable === true ? 'yes'
                : v.fixAvailable ? `\`${v.fixAvailable.name}@${v.fixAvailable.version}\`` : 'no'
              return `| \`${v.name}\` | ${v.severity} | ${fix} |`
            })

            const table = (header, rows, empty) =>
              rows.length ? `${header}\n\n| Package | From | To |\n| --- | --- | --- |\n${rows.join('\n')}` : `${header}\n\n${empty}`

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const body = [
              `_Auto-generated by [\`deps-report.yml\`](${runUrl}). Report-only — Dependabot opens no PRs._`,
              '',
              table('## 🚀 Major updates (actionable)', majors, '_None — all majors are current or blocked below._'),
              '',
              '## ⛔ Blocked by upstream (tracked, do not force)',
              '',
              '| Package | Latest | Blocker |',
              '| --- | --- | --- |',
              '| `typescript` | 7.x | `@typescript-eslint` peer caps at `<6.1.0` |',
              '| `vite` | 8.x | `electron-vite` peer is `^5 \\|\\| ^6 \\|\\| ^7` |',
              '| `@vitejs/plugin-react` | 6.x | requires `vite ^8` (coupled to the vite block) |',
              '',
              '_Revisit when the blocker packages ship support; then move them up to the actionable table._',
              '',
              table('## 🩹 Minor / patch updates', minors, '_None._'),
              '',
              `## 🔒 Security (\`npm audit\`)`,
              '',
              `Totals — critical: ${meta.critical || 0}, high: ${meta.high || 0}, moderate: ${meta.moderate || 0}, low: ${meta.low || 0}.`,
              '',
              vulnRows.length
                ? `| Package | Severity | Fix available |\n| --- | --- | --- |\n${vulnRows.join('\n')}`
                : '_No known vulnerabilities._',
            ].join('\n')

            // Ensure the label exists (idempotent).
            try {
              await github.rest.issues.getLabel({ ...context.repo, name: LABEL })
            } catch {
              await github.rest.issues.createLabel({ ...context.repo, name: LABEL, color: '0e8a16', description: 'Weekly dependency report' })
            }

            // Upsert the single rolling issue.
            const existing = await github.rest.issues.listForRepo({
              ...context.repo, state: 'open', labels: LABEL, per_page: 1,
            })
            if (existing.data.length) {
              await github.rest.issues.update({ ...context.repo, issue_number: existing.data[0].number, title: TITLE, body })
              core.notice(`Updated dashboard issue #${existing.data[0].number}`)
            } else {
              const created = await github.rest.issues.create({ ...context.repo, title: TITLE, body, labels: [LABEL] })
              core.notice(`Created dashboard issue #${created.data.number}`)
            }
