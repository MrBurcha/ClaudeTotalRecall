name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least-privilege GITHUB_TOKEN: the check job only checks out the repo and runs
# npm scripts (typecheck/lint/format/coverage) — it never writes to the repo,
# so read-only contents is enough. (CodeQL: actions/missing-workflow-permissions.)
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      # hashFiles('package-lock.json') would seem like the obvious cache key, but
      # `npm version` (run on every "release: vX.Y.Z" commit) rewrites the lockfile's
      # top-level version field, changing that hash even when Electron itself didn't
      # change — keying on Electron's own resolved version avoids invalidating the
      # cache on every release.
      - name: Resolve Electron version for cache key
        id: electron-version
        run: echo "version=$(jq -r '.packages["node_modules/electron"].version' package-lock.json)" >> "$GITHUB_OUTPUT"
      - name: Cache Electron runtime binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: ${{ runner.os }}-electron-${{ steps.electron-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-electron-
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test:coverage
