name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least-privilege GITHUB_TOKEN: the check job only checks out the repo and runs
# npm scripts (typecheck/lint/format/coverage) — it never writes to the repo,
# so read-only contents is enough. (CodeQL: actions/missing-workflow-permissions.)
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Cache Electron runtime binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test:coverage
