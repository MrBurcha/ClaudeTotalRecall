appId: com.mrburcha.claudetr
productName: ClaudeTR
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
# Uso personal: builds SIN firmar (decisión del usuario).
mac:
  target:
    - dmg
  category: public.app-category.developer-tools
  identity: null
dmg:
  title: ClaudeTR
linux:
  target:
    - AppImage
    - deb
    - pacman
  category: Development
  maintainer: MrBurcha
# Deps con nombres de Arch: el default de electron-builder usa nomenclatura
# Debian (p.ej. http-parser), que no existe en los repos de Arch. El .deb
# conserva sus defaults; solo el pacman necesita este override.
pacman:
  depends:
    - c-ares
    - ffmpeg
    - gtk3
    - libevent
    - libvpx
    - libxslt
    - libxss
    - minizip
    - nss
    - re2
    - snappy
    - libnotify
# El CI (release en tag) publica los artefactos en el Release de este repo.
publish:
  provider: github
  owner: MrBurcha
  repo: ClaudeTotalRecall
