appId: com.mrburcha.claudetotalrecall
productName: Claude Total Recall
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
# The icon PNG doesn't travel in `files` (the bundle is out/ + package.json); we
# copy it to resources/ so the window uses it at runtime via process.resourcesPath
# (Linux's taskbar/overview read it from there).
extraResources:
  - from: build/icon.png
    to: icon.png
# Personal use: no Developer ID certificate, no notarization. The bundle is
# ad-hoc-signed in `afterPack` (below) so Apple Silicon macOS doesn't flag it as
# "damaged".
mac:
  target:
    - dmg
  category: public.app-category.developer-tools
  identity: null
# The bundle ships without a cert; this hook ad-hoc-signs it after packaging
# (before building the dmg) to seal the resources and avoid the "damaged" verdict.
afterPack: scripts/afterPack.cjs
dmg:
  # Volume icon (#18): explicit `null` → electron-builder passes no `--icon` to dmgbuild,
  # so the mounted DMG shows macOS's generic removable-disk icon instead of the app icon
  # (the "square" reported in #18). dmg-builder distinguishes explicit `null` (no icon)
  # from `undefined` (which would re-default to the app icon). Stopgap until #18 ships a
  # branded drive icon aligned with the app's visual identity (#9).
  icon: null
  # Versioned volume name (electron-builder default): each version mounts under a
  # distinct name, so Finder reads a fresh .DS_Store without carrying over state.
  title: Claude Total Recall ${version}
  # Background with the install/open instructions (build/background.png +
  # background@2x.png for retina). Coords in px from the top-left, at the icon
  # center: the app on the left, the Applications alias on the right.
  #
  # No `window` key here: dmg-builder ignores it whenever `background` is set
  # (confirmed in node_modules/dmg-builder/out/dmgUtil.js — it measures the
  # background file with `sips` and uses THAT as the window's total size,
  # title bar included). The background PNG's own pixel dimensions are the
  # real source of truth for the window size. #67 sized it at 640×528 to clear
  # just the ~28px title bar, but #70 showed that's not enough: dmgbuild's
  # .DS_Store also asks Finder to hide the path bar and status bar for this
  # window, and on macOS 26.2 Finder ignores that whenever the user has those
  # View-menu toggles on globally — both bars render stacked at the BOTTOM of
  # the window on that Finder version. scripts/background.html/make-background.sh
  # now generate the background at 640×604, with most of the extra headroom
  # below the design (a small top cushion is just breathing room under the
  # title bar). These coordinates must stay in sync with the glow positions in
  # background.html.
  background: build/background.png
  iconSize: 120
  iconTextSize: 13
  contents:
    - x: 165
      y: 217
      type: file
    - x: 475
      y: 217
      type: link
      path: /Applications
linux:
  target:
    - AppImage
    - deb
    - pacman
  category: Development
  maintainer: MrBurcha
  # Multi-size icon set. Without this, electron-builder installs the single
  # build/icon.png at its native 1024x1024 into hicolor/1024x1024/apps — a size the
  # icon theme does NOT index — so the launcher (app grid) shows a generic icon.
  # A directory of <N>x<N>.png (see scripts/make-icons.sh) lands each size in its
  # hicolor dir; 256/512 are what the app grid renders. (issue #19)
  icon: build/icons
  # Pin the executable name so the binary, Exec, the .desktop Icon field and the
  # installed hicolor/*/apps/<name>.png are all deterministic lowercase, matching
  # StartupWMClass below. Otherwise they derive from productName ("Claude Total
  # Recall", with spaces).
  executableName: claude-total-recall
  # GNOME/mutter binds the window to its .desktop entry via WM_CLASS (case-sensitive).
  # Electron reports WM_CLASS "claude-total-recall" (the package.json name), but
  # electron-builder defaults StartupWMClass to productName ("Claude Total Recall") →
  # it won't match and the DE shows a generic icon. Force it to the real WM_CLASS.
  # electron-builder 26 nests the [Desktop Entry] pairs under `desktop.entry`
  # (v25 accepted them flat under `desktop`).
  desktop:
    entry:
      StartupWMClass: claude-total-recall
# Deps with Arch names: electron-builder's default uses Debian naming (e.g.
# http-parser), which doesn't exist in the Arch repos. The .deb keeps its
# defaults; only the pacman package needs this override.
pacman:
  depends:
    - c-ares
    - ffmpeg
    - gtk3
    - libevent
    - libvpx
    - libxslt
    - libxss
    - minizip
    - nss
    - re2
    - snappy
    - libnotify
# CI (release on tag) publishes the artifacts to this repo's Release.
publish:
  provider: github
  owner: MrBurcha
  repo: ClaudeTotalRecall
