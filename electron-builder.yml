appId: com.mrburcha.claudetr
productName: ClaudeTR
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
# El PNG del ícono no viaja en `files` (el bundle es out/ + package.json); lo
# copiamos a resources/ para que la ventana lo use en runtime vía
# process.resourcesPath (la barra de tareas/overview de Linux lo toman de ahí).
extraResources:
  - from: build/icon.png
    to: icon.png
# Uso personal: sin certificado Developer ID ni notarización (decisión del
# usuario). El bundle se firma ad-hoc en `afterPack` (ver abajo) para que macOS
# en Apple Silicon no lo marque como "dañado".
mac:
  target:
    - dmg
  category: public.app-category.developer-tools
  identity: null
# El bundle sale sin cert; este hook lo firma ad-hoc tras empaquetarlo (antes
# de armar el dmg) para sellar los recursos y evitar el veredicto "dañado".
afterPack: scripts/afterPack.cjs
dmg:
  title: ClaudeTR
  # Fondo con las instrucciones de instalación/apertura (build/background.png +
  # background@2x.png para retina). Coords en px desde arriba-izquierda, al centro
  # del ícono: la app a la izquierda, el alias a Aplicaciones a la derecha.
  background: build/background.png
  window:
    width: 640
    height: 500
  iconSize: 120
  iconTextSize: 13
  contents:
    - x: 165
      y: 195
      type: file
    - x: 475
      y: 195
      type: link
      path: /Applications
linux:
  target:
    - AppImage
    - deb
    - pacman
  category: Development
  maintainer: MrBurcha
  # GNOME/mutter asocia la ventana a su .desktop por WM_CLASS, case-sensitive.
  # Electron reporta WM_CLASS "claudetr" (el name de package.json), pero el default
  # de electron-builder es StartupWMClass=productName ("ClaudeTR") → no matchea y el
  # DE muestra un ícono genérico. Lo forzamos al WM_CLASS real.
  desktop:
    StartupWMClass: claudetr
# Deps con nombres de Arch: el default de electron-builder usa nomenclatura
# Debian (p.ej. http-parser), que no existe en los repos de Arch. El .deb
# conserva sus defaults; solo el pacman necesita este override.
pacman:
  depends:
    - c-ares
    - ffmpeg
    - gtk3
    - libevent
    - libvpx
    - libxslt
    - libxss
    - minizip
    - nss
    - re2
    - snappy
    - libnotify
# El CI (release en tag) publica los artefactos en el Release de este repo.
publish:
  provider: github
  owner: MrBurcha
  repo: ClaudeTotalRecall
