appId: com.mrburcha.claudetotalrecall
productName: Claude Total Recall
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
# El PNG del ícono no viaja en `files` (el bundle es out/ + package.json); lo
# copiamos a resources/ para que la ventana lo use en runtime vía
# process.resourcesPath (la barra de tareas/overview de Linux lo toman de ahí).
extraResources:
  - from: build/icon.png
    to: icon.png
# Uso personal: sin certificado Developer ID ni notarización (decisión del
# usuario). El bundle se firma ad-hoc en `afterPack` (ver abajo) para que macOS
# en Apple Silicon no lo marque como "dañado".
mac:
  target:
    - dmg
  category: public.app-category.developer-tools
  identity: null
# El bundle sale sin cert; este hook lo firma ad-hoc tras empaquetarlo (antes
# de armar el dmg) para sellar los recursos y evitar el veredicto "dañado".
afterPack: scripts/afterPack.cjs
dmg:
  # Nombre de volumen versionado (default de electron-builder): cada versión monta
  # con un nombre distinto, así Finder lee el .DS_Store fresco sin arrastrar estado.
  title: Claude Total Recall ${version}
  # Fondo con las instrucciones de instalación/apertura (build/background.png +
  # background@2x.png para retina). Coords en px desde arriba-izquierda, al centro
  # del ícono: la app a la izquierda, el alias a Aplicaciones a la derecha.
  background: build/background.png
  window:
    width: 640
    # El alto es el de la ventana TOTAL (incluye la barra de título ~28px); el
    # fondo (640x500) va en el área de contenido, así que sumamos la barra para
    # que se vea completo sin recorte.
    height: 528
  iconSize: 120
  iconTextSize: 13
  contents:
    - x: 165
      y: 195
      type: file
    - x: 475
      y: 195
      type: link
      path: /Applications
linux:
  target:
    - AppImage
    - deb
    - pacman
  category: Development
  maintainer: MrBurcha
  # Multi-size icon set. Without this, electron-builder installs the single
  # build/icon.png at its native 1024x1024 into hicolor/1024x1024/apps — a size the
  # icon theme does NOT index — so the launcher (app grid) shows a generic icon.
  # A directory of <N>x<N>.png (see scripts/make-icons.sh) lands each size in its
  # hicolor dir; 256/512 are what the app grid renders. (issue #19)
  icon: build/icons
  # Pin the executable name so the binary, Exec, the .desktop Icon field and the
  # installed hicolor/*/apps/<name>.png are all deterministic lowercase, matching
  # StartupWMClass below. Otherwise they derive from productName ("Claude Total
  # Recall", with spaces).
  executableName: claude-total-recall
  # GNOME/mutter binds the window to its .desktop entry via WM_CLASS (case-sensitive).
  # Electron reports WM_CLASS "claude-total-recall" (the package.json name), but
  # electron-builder defaults StartupWMClass to productName ("Claude Total Recall") →
  # it won't match and the DE shows a generic icon. Force it to the real WM_CLASS.
  desktop:
    StartupWMClass: claude-total-recall
# Deps con nombres de Arch: el default de electron-builder usa nomenclatura
# Debian (p.ej. http-parser), que no existe en los repos de Arch. El .deb
# conserva sus defaults; solo el pacman necesita este override.
pacman:
  depends:
    - c-ares
    - ffmpeg
    - gtk3
    - libevent
    - libvpx
    - libxslt
    - libxss
    - minizip
    - nss
    - re2
    - snappy
    - libnotify
# El CI (release en tag) publica los artefactos en el Release de este repo.
publish:
  provider: github
  owner: MrBurcha
  repo: ClaudeTotalRecall
